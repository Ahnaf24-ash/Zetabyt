<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETABYT Admin | Submissions</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 8rem auto 3rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
        }
        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .admin-header h1 {
            color: var(--accent-primary);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: var(--accent-primary);
        }
        td {
            font-size: 0.95rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .btn-refresh {
            background: var(--accent-primary);
            color: #000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        .btn-refresh:hover {
            box-shadow: 0 0 15px var(--accent-secondary);
        }
    </style>
</head>
<body class="page-bg-cinematic">

    <!-- Navigation -->
    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link">
                <img src="Web Logo.jpeg" alt="ZETABYT Logo" class="logo-img" />
                <span class="logo-text">ZETABYT</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">Home</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="admin-container">
            <div class="admin-header">
                <h1>Contact Submissions</h1>
                <p>View all requests sent through the Get Started page.</p>
            </div>
            
            <button class="btn-refresh" id="refreshBtn">Refresh Data</button>
            
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date/Time</th>
                            <th>Name</th>
                            <th>Email Address</th>
                            <th>Phone Number</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="empty-state">Loading submissions...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>



    <!-- Main Site Script (for Cursor and Nav) -->
    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fetchContacts = async () => {
                const tableBody = document.getElementById('tableBody');
                try {
                    const response = await fetch('/api/contacts');
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        tableBody.innerHTML = ''; // Clear loading state
                        
                        // Sort by newest first
                        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        
                        data.forEach(entry => {
                            const date = new Date(entry.timestamp).toLocaleString();
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td>${date}</td>
                                <td><strong>${entry.name}</strong></td>
                                <td><a href="mailto:${entry.email}" style="color: var(--accent-secondary);">${entry.email}</a></td>
                                <td><a href="tel:${entry.phone}" style="color: var(--accent-secondary);">${entry.phone || 'N/A'}</a></td>
                                <td style="white-space: pre-wrap;">${entry.message}</td>
                            `;
                            tableBody.appendChild(tr);
                        });
                    } else {
                        tableBody.innerHTML = '<tr><td colspan="5" class="empty-state">No submissions found yet.</td></tr>';
                    }
                } catch (err) {
                    console.error(err);
                    tableBody.innerHTML = '<tr><td colspan="5" class="empty-state" style="color: #ff4c4c;">Failed to load data. Please make sure the server is running.</td></tr>';
                }
            };

            // Initial fetch
            fetchContacts();

            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', () => {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="empty-state">Loading submissions...</td></tr>';
                fetchContacts();
            });
        });
    </script>
</body>
</html>
